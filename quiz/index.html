<style>
/* ===== Quiz Page Styles ===== */
:root {
  --primary: #0e6149; --primary-light: #1a8a6a; --primary-dark: #074734;
  --secondary: #c9a96e; --secondary-light: #e6cd9a; --secondary-dark: #8a6f3e;
  --bg-primary: #fdfbf6; --bg-secondary: #f5efe1; --text-primary: #1f2d28;
  --text-secondary: #4a5a54; --text-muted: #7a8a84; --border-light: #e2dccc;
  --shadow-sm: 0 1px 2px rgba(10,42,34,0.06);
  --shadow-md: 0 4px 10px -2px rgba(10,42,34,0.10);
  --shadow-lg: 0 14px 30px -6px rgba(10,42,34,0.14);
  --radius-sm: 8px; --radius-md: 14px; --radius-lg: 20px; --radius-full: 9999px;
  --font-sans: 'Cairo','Noto Sans Arabic',sans-serif;
  --font-quran: 'Amiri','Noto Sans Arabic',serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-sans); color: var(--text-primary);
  background: var(--bg-primary); line-height: 1.7; -webkit-font-smoothing: antialiased;
}
.container { width: 100%; max-width: 800px; margin: 0 auto; padding: 0 1.5rem; }

/* Header */
.quiz-header {
  background: linear-gradient(135deg, var(--primary-dark), var(--primary));
  color: #fff; padding: 1.5rem 0; text-align: center; position: relative;
}
.quiz-header h1 { font-size: 1.35rem; font-weight: 700; margin-bottom: 4px; }
.quiz-header p { font-size: 0.85rem; opacity: 0.85; }
.quiz-header .back-link {
  position: absolute; top: 50%; right: 1.5rem; transform: translateY(-50%);
  color: #fff; font-size: 0.85rem; opacity: 0.8; display: flex; align-items: center; gap: 6px;
}
html[dir="ltr"] .quiz-header .back-link { right: auto; left: 1.5rem; }
.quiz-header .back-link:hover { opacity: 1; }

/* Progress */
.progress-bar {
  height: 4px; background: var(--border-light); margin: 0 auto;
  max-width: 800px; border-radius: 2px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary));
  width: 0%; transition: width 0.5s ease;
}
.progress-text {
  text-align: center; font-size: 0.8rem; color: var(--text-muted);
  margin-top: 6px; margin-bottom: 2rem;
}

/* Quiz Card */
.quiz-card {
  background: #fff; border: 1px solid var(--border-light);
  border-radius: var(--radius-lg); padding: 2rem 2.5rem;
  box-shadow: var(--shadow-md); margin-bottom: 2rem;
  min-height: 420px; display: flex; flex-direction: column;
}
.step-title {
  font-size: 1.15rem; font-weight: 700; color: var(--primary);
  margin-bottom: 0.5rem; display: flex; align-items: center; gap: 10px;
}
html[dir="ltr"] .step-title { flex-direction: row-reverse; }
.step-title .step-num {
  width: 32px; height: 32px; background: var(--primary); color: #fff;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 0.9rem; font-weight: 700; flex-shrink: 0;
}
.step-question { font-size: 1.25rem; font-weight: 700; margin-bottom: 1.5rem; line-height: 1.5; }
.step-sub { font-size: 0.92rem; color: var(--text-secondary); margin-bottom: 1.5rem; }

/* Options */
.options-grid { display: flex; flex-direction: column; gap: 0.75rem; }
.multi-hint {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(14,97,73,0.06);
  color: var(--primary);
  font-size: 0.8rem;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: var(--radius-full);
  margin-bottom: 0.75rem;
  border: 1px solid rgba(14,97,73,0.12);
}
.multi-hint::before {
  content: '✓';
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 18px;
  height: 18px;
  background: var(--primary);
  color: #fff;
  border-radius: 50%;
  font-size: 0.7rem;
}
.option-btn {
  display: flex; align-items: center; gap: 1rem;
  padding: 1rem 1.25rem; background: var(--bg-primary);
  border: 2px solid var(--border-light); border-radius: var(--radius-md);
  cursor: pointer; font-family: inherit; font-size: 1rem; color: var(--text-primary);
  text-align: right; transition: all 0.2s ease; width: 100%;
}
html[dir="ltr"] .option-btn { text-align: left; flex-direction: row-reverse; }
.option-btn:hover {
  border-color: var(--primary-light); background: rgba(14,97,73,0.03);
  transform: translateX(-4px);
}
html[dir="ltr"] .option-btn:hover { transform: translateX(4px); }
.option-btn.selected {
  border-color: var(--primary); background: rgba(14,97,73,0.06);
}
.option-btn .opt-letter {
  width: 28px; height: 28px; border: 2px solid var(--border-light);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 0.8rem; font-weight: 700; color: var(--text-muted); flex-shrink: 0;
  transition: all 0.2s ease;
}
.option-btn.selected .opt-letter { background: var(--primary); color: #fff; border-color: var(--primary); }
.option-btn .opt-text { flex: 1; }

/* Nav Buttons */
.nav-btns {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: auto; padding-top: 1.5rem; gap: 1rem;
}
.btn {
  padding: 12px 28px; border-radius: var(--radius-full); font-family: inherit;
  font-size: 0.95rem; font-weight: 600; cursor: pointer; border: none;
  transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 8px;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-secondary { background: transparent; color: var(--text-muted); border: 1px solid var(--border-light); }
.btn-secondary:hover { background: var(--bg-secondary); }

/* Result Page */
.result-card { text-align: center; padding: 3rem 2rem; }
.result-icon { font-size: 4rem; margin-bottom: 1rem; }
.result-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; color: var(--text-primary); }
.result-subtitle { font-size: 1rem; color: var(--text-secondary); margin-bottom: 2rem; }

.diagnosis-box {
  background: linear-gradient(135deg, rgba(14,97,73,0.04), rgba(201,169,110,0.06));
  border: 1px solid var(--border-light); border-radius: var(--radius-lg);
  padding: 1.5rem 2rem; text-align: right; margin-bottom: 1.5rem;
  border-right: 4px solid var(--primary);
}
html[dir="ltr"] .diagnosis-box { text-align: left; border-right: none; border-left: 4px solid var(--primary); }
.diagnosis-box h3 { font-size: 1.05rem; color: var(--primary); margin-bottom: 0.75rem; }
.diagnosis-box p { font-size: 0.97rem; color: var(--text-secondary); line-height: 1.8; }
.diagnosis-box ul { padding-right: 1.2rem; }
html[dir="ltr"] .diagnosis-box ul { padding-right: 0; padding-left: 1.2rem; }
.diagnosis-box li { font-size: 0.95rem; color: var(--text-secondary); padding: 4px 0; }

.recommendation {
  background: #fff; border: 2px solid var(--secondary);
  border-radius: var(--radius-lg); padding: 1.5rem;
  margin-bottom: 2rem; text-align: right;
}
html[dir="ltr"] .recommendation { text-align: left; }
.recommendation h4 { color: var(--secondary-dark); font-size: 1rem; margin-bottom: 0.5rem; }
.recommendation p { font-size: 0.95rem; color: var(--text-secondary); line-height: 1.7; }

.messenger-cta {
  display: inline-flex; align-items: center; gap: 10px;
  background: linear-gradient(135deg, #0084FF, #0066CC); color: #fff;
  padding: 16px 32px; border-radius: var(--radius-full); font-size: 1.05rem;
  font-weight: 700; text-decoration: none; box-shadow: 0 8px 24px rgba(0,102,204,0.3);
  transition: transform 0.2s ease, box-shadow 0.2s ease; margin-bottom: 1rem;
}
.messenger-cta:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,102,204,0.4); }
.messenger-cta svg { width: 24px; height: 24px; }

.privacy-note {
  font-size: 0.85rem; color: var(--text-muted); display: flex; align-items: center;
  justify-content: center; gap: 6px; margin-top: 1rem;
}

/* Footer */
.quiz-footer { text-align: center; padding: 2rem 0; font-size: 0.8rem; color: var(--text-muted); }
.quiz-footer a { color: var(--primary); }

/* ===== Treatment Plan Selector ===== */
.treatment-selector {
  margin: 2rem 0 1.5rem;
  text-align: center;
}
.selector-headline {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 1.25rem;
}
.plan-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-bottom: 1rem;
}
.plan-option {
  background: var(--bg-primary);
  border: 2px solid var(--border-light);
  border-radius: var(--radius-lg);
  padding: 1.25rem 1rem;
  text-align: right;
  position: relative;
  transition: all 0.25s ease;
}
.plan-option:hover {
  border-color: var(--primary-light);
  transform: translateY(-3px);
  box-shadow: var(--shadow-md);
}
.plan-option.recommended {
  border-color: var(--primary);
  background: linear-gradient(135deg, rgba(14,97,73,0.04), rgba(201,169,110,0.06));
}
.plan-badge-rec {
  position: absolute;
  top: -10px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--primary);
  color: #fff;
  font-size: 0.7rem;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: var(--radius-full);
  white-space: nowrap;
}
.plan-option-name {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 4px;
}
.plan-option-price {
  font-size: 1.6rem;
  font-weight: 800;
  color: var(--primary);
  margin-bottom: 0.75rem;
}
.plan-option-price span {
  font-size: 0.8rem;
  font-weight: 400;
  color: var(--text-muted);
}
.plan-features-custom {
  list-style: none;
  padding: 0;
  margin: 0 0 1rem;
}
.plan-features-custom li {
  font-size: 0.85rem;
  color: var(--text-secondary);
  padding: 4px 0;
  display: flex;
  align-items: flex-start;
  gap: 6px;
}
.plan-features-custom li::before {
  content: '✓';
  color: var(--primary);
  font-weight: 700;
  flex-shrink: 0;
}
.plan-option .btn-plan {
  display: block;
  width: 100%;
  text-align: center;
  padding: 12px;
  border-radius: var(--radius-full);
  font-size: 0.9rem;
  font-weight: 700;
  text-decoration: none;
  color: #fff;
  background: var(--primary);
  transition: all 0.2s ease;
  border: none;
  cursor: pointer;
}
.plan-option .btn-plan:hover {
  background: var(--primary-dark);
  transform: translateY(-2px);
}
.plan-option .btn-plan-secondary {
  background: transparent;
  color: var(--text-secondary);
  border: 1.5px solid var(--border-light);
}
.plan-option .btn-plan-secondary:hover {
  background: var(--bg-secondary);
  border-color: var(--primary-light);
}
html[dir="ltr"] .plan-option { text-align: left; }
html[dir="ltr"] .plan-features-custom li { flex-direction: row-reverse; }

/* ===== Send to Dr. Sarah Section ===== */
.send-to-sarah-section {
  margin: 2.5rem 0 1rem;
  position: relative;
}
.islamic-frame {
  background: linear-gradient(135deg, #fdfbf6, #f5efe1);
  border: 2px solid var(--secondary);
  border-radius: var(--radius-lg);
  padding: 2rem 1.5rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.islamic-frame::before,
.islamic-frame::after {
  content: '☪';
  position: absolute;
  font-size: 4rem;
  opacity: 0.06;
  color: var(--primary);
  line-height: 1;
}
.islamic-frame::before { top: 8px; right: 12px; }
.islamic-frame::after { bottom: 8px; left: 12px; transform: rotate(180deg); }
.islamic-frame .frame-corner {
  position: absolute;
  width: 24px;
  height: 24px;
  border: 2px solid var(--secondary);
}
.islamic-frame .frame-corner.tl { top: -2px; left: -2px; border-right: none; border-bottom: none; border-radius: var(--radius-lg) 0 0 0; }
.islamic-frame .frame-corner.tr { top: -2px; right: -2px; border-left: none; border-bottom: none; border-radius: 0 var(--radius-lg) 0 0; }
.islamic-frame .frame-corner.bl { bottom: -2px; left: -2px; border-right: none; border-top: none; border-radius: 0 0 0 var(--radius-lg); }
.islamic-frame .frame-corner.br { bottom: -2px; right: -2px; border-left: none; border-top: none; border-radius: 0 0 var(--radius-lg) 0; }
.sarah-section-title {
  font-size: 1.15rem;
  font-weight: 800;
  color: var(--primary);
  margin-bottom: 0.5rem;
}
.sarah-section-sub {
  font-size: 0.9rem;
  color: var(--text-secondary);
  margin-bottom: 1.25rem;
  line-height: 1.7;
}
.sarah-form {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
  max-width: 420px;
  margin: 0 auto;
  text-align: right;
}
html[dir="ltr"] .sarah-form { text-align: left; }
.sarah-form input {
  padding: 12px 16px;
  border: 1.5px solid var(--border-light);
  border-radius: var(--radius-md);
  font-family: inherit;
  font-size: 0.95rem;
  background: #fff;
  color: var(--text-primary);
}
.sarah-form input:focus {
  outline: none;
  border-color: var(--primary);
}
.sarah-form .btn-send {
  padding: 14px 24px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff;
  border: none;
  border-radius: var(--radius-full);
  font-family: inherit;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s ease;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.sarah-form .btn-send:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(14,97,73,0.25);
}
.sarah-form .btn-send:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}
.sarah-trust-line {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
  margin-top: 1rem;
}
.sarah-trust-line span {
  font-size: 0.75rem;
  color: var(--text-muted);
  background: rgba(14,97,73,0.05);
  padding: 4px 10px;
  border-radius: var(--radius-full);
}

    };
    text = fallbacks[key] || key;
  }
  if (vars) {
    Object.keys(vars).forEach(k => {
      text = text.replace(new RegExp('{' + k + '}', 'g'), vars[k]);
    });
  }
  return text;
}

// ===== Step definitions (structure only) =====
const stepDefs = [
  { id: 'condition', multi: true, dynamic: false },
  { id: 'age', multi: false, dynamic: false },
  { id: 'symptom_detail', multi: false, dynamic: true },
  { id: 'health', multi: true, dynamic: false },
  { id: 'habits', multi: false, dynamic: false },
  { id: 'lifestyle', multi: true, dynamic: false },
  { id: 'goal', multi: false, dynamic: false },
];

const stepOptionValues = {
  condition: ['pe', 'ed', 'size', 'all'],
  age: ['18-25', '26-35', '36-45', '46-55', '55+'],
  health: ['diabetes', 'prostate', 'pressure', 'depression', 'none'],
  habits: ['daily', 'weekly', 'rarely', 'never'],
  lifestyle: ['stress', 'sleep', 'sedentary', 'smoke', 'healthy'],
  goal: ['duration', 'hardness', 'size', 'confidence', 'all'],
};

let currentStep = 0;
const answers = {};

function getStepData(stepId) {
  const title = t(`quiz_step_${stepId}_title`);
  const question = t(`quiz_step_${stepId}_question`);
  const subtitle = t(`quiz_step_${stepId}_subtitle`);
  const options = [];
  const values = stepOptionValues[stepId] || [];
  for (let i = 0; i < values.length; i++) {
    const label = t(`quiz_step_${stepId}_opt${i}`);
    if (label && label !== `quiz_step_${stepId}_opt${i}`) {
      options.push({ value: values[i], label });
    }
  }
  return { title, question, subtitle, options };
}

function getSymptomStep() {
  const cond = answers.condition || [];
  const hasPE = cond.includes('pe') || cond.includes('all');
  const hasED = cond.includes('ed') || cond.includes('all');
  const hasSize = cond.includes('size') || cond.includes('all');

  let type = 'default';
  if (hasPE) type = 'pe';
  else if (hasED) type = 'ed';
  else if (hasSize) type = 'size';

  const title = t('quiz_step_symptom_title');
  const question = t(`quiz_step_symptom_${type}_question`);
  const subtitle = t(`quiz_step_symptom_${type}_subtitle`);
  const values = ['under1', '1-3', '3-5', '5-10', 'over10'];
  const options = [];
  for (let i = 0; i < values.length; i++) {
    const label = t(`quiz_step_symptom_${type}_opt${i}`);
    if (label && label !== `quiz_step_symptom_${type}_opt${i}`) {
      options.push({ value: values[i], label });
    }
  }
  return { title, question, subtitle, options };
}

function renderStep() {
  const card = document.getElementById('quizCard');
  const progress = ((currentStep) / stepDefs.length) * 100;
  document.getElementById('progressFill').style.width = progress + '%';
  document.getElementById('progressText').textContent =
    t('quiz_progress', { current: currentStep + 1, total: stepDefs.length });

  if (currentStep >= stepDefs.length) {
    renderResult();
    return;
  }

  let step = stepDefs[currentStep];
  let data;
  if (step.dynamic) {
    data = getSymptomStep();
  } else {
    data = getStepData(step.id);
  }

  const saved = answers[step.id] || [];
  const isMulti = step.multi;

  let html = `
    <div class="fade-in">
      <div class="quiz-top-bar">
        <a href="../index.html" class="quiz-logo-mini">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
          ${t('quiz_logo_text')}
        </a>
        <a href="../index.html" class="quiz-home-btn">${t('quiz_home_btn')}</a>
      </div>
      <div class="step-title"><span class="step-num">${currentStep + 1}</span>${data.title}</div>
      <div class="step-question">${data.question}</div>
      ${data.subtitle ? `<p class="step-sub">${data.subtitle}</p>` : ''}
      ${isMulti ? `<div class="multi-hint">${t('quiz_multi_select_hint')}</div>` : ''}
      <div class="options-grid">
  `;

  data.options.forEach((opt, i) => {
    const letter = (i + 1);
    const selected = saved.includes(opt.value) ? 'selected' : '';
    html += `
      <button class="option-btn ${selected}" data-value="${opt.value}" onclick="selectOption('${step.id}', '${opt.value}', ${isMulti})">
        <span class="opt-letter">${letter}</span>
        <span class="opt-text">${opt.label}</span>
      </button>
    `;
  });

  html += `</div><div class="nav-btns">`;

  if (currentStep > 0) {
    html += `<button class="btn btn-secondary" onclick="prevStep()">${t('quiz_prev')}</button>`;
  } else {
    html += `<span></span>`;
  }

  const hasAnswer = saved.length > 0;
  html += `<button class="btn btn-primary" id="nextBtn" ${hasAnswer ? '' : 'disabled'} onclick="nextStep()">${t('quiz_next')}</button>`;

  html += `</div></div>`;
  card.innerHTML = html;
}

function selectOption(stepId, value, isMulti) {
  const btns = document.querySelectorAll('.option-btn');
  if (!isMulti) {
    btns.forEach(b => b.classList.remove('selected'));
    answers[stepId] = [value];
  } else {
    let arr = answers[stepId] || [];
    if (value === 'none' || value === 'healthy') {
      btns.forEach(b => b.classList.remove('selected'));
      arr = [value];
    } else {
      arr = arr.filter(v => v !== 'none' && v !== 'healthy');
      if (arr.includes(value)) {
        arr = arr.filter(v => v !== value);
      } else {
        arr.push(value);
      }
    }
    answers[stepId] = arr;
  }

  btns.forEach(btn => {
    const val = btn.dataset.value;
    const arr = answers[stepId] || [];
    if (arr.includes(val)) btn.classList.add('selected');
    else btn.classList.remove('selected');
  });

  document.getElementById('nextBtn').disabled = (answers[stepId] || []).length === 0;
}

function nextStep() {
  currentStep++;
  renderStep();
}

function prevStep() {
  currentStep--;
  renderStep();
}

        <p style="margin-top: 0.75rem; font-weight: 600; color: #7f1d1d;">${t('quiz_risks_footer')}</p>
      </div>

      <div class="recommendation">
        <h4>${t('quiz_rec_title', { package: recPackage })}</h4>
        <p style="margin-bottom: 1rem;">${t('quiz_rec_intro', { package: recPackage })}</p>
        <ul style="padding-right: 1.2rem; margin-bottom: 1rem;">
          ${treatmentPhases.map(t => `<li style="padding: 6px 0; font-size: 0.95rem;">${t}</li>`).join('')}
        </ul>
        <p><strong>${t('quiz_rec_duration')}</strong> ${packageDuration} · <strong>${t('quiz_rec_price')}</strong> ${t('quiz_rec_price_note')}</p>
        <p style="margin-top: 0.75rem; font-size: 0.9rem; color: var(--text-muted);">${t('quiz_rec_ingredients_note')}</p>
      </div>

      ${treatmentSelectorHtml}

      ${sendToSarahHtml}

      <p class="privacy-note">
        <span>🔒</span> ${t('quiz_privacy_note')}
      </p>
    </div>
  `;

  card.innerHTML = html;
}

// ===== Send Diagnosis to Dr. Sarah (Chinese report for admin) =====
function sendDiagnosisToSarah(e) {
  e.preventDefault();
  const form = e.target;
  const btn = form.querySelector('.btn-send');
  const originalText = btn.textContent;

  const name = form.querySelector('[name="sendName"]').value.trim();
  const phone = form.querySelector('[name="sendPhone"]').value.trim();

  if (!name) {
    alert(t('quiz_alert_name_required'));
    return;
  }

  // === Chinese labels mapping ===
  const condMap = { pe: '早泄', ed: '阳痿', size: '增大', all: '全部问题' };
  const ageMap = { '18-25': '18-25岁', '26-35': '26-35岁', '36-45': '36-45岁', '46-55': '46-55岁', '55+': '55岁以上' };
  const healthMap = { diabetes: '糖尿病', prostate: '前列腺问题', pressure: '高血压', depression: '抑郁/焦虑', none: '无' };
  const habitMap = { daily: '每天或几乎每天', weekly: '每周几次', rarely: '很少', never: '从不' };
  const lifeMap = { stress: '高压工作/精神压力大', sleep: '睡眠不足', sedentary: '久坐不动/不运动', smoke: '吸烟或饮酒', healthy: '健康生活方式' };
  const goalMap = { duration: '延长性爱时间(30+分钟)', hardness: '更硬更持久的勃起', size: '增大尺寸和长度', confidence: '恢复自信和男子气概', all: '全面改善所有问题' };

  const cond = answers.condition || [];
  const hasPE = cond.includes('pe') || cond.includes('all');
  const hasED = cond.includes('ed') || cond.includes('all');
  const hasSize = cond.includes('size') || cond.includes('all');
  const health = answers.health || [];
  const habits = answers.habits || [];
  const lifestyle = answers.lifestyle || [];
  const goal = answers.goal || [];
  const symptom = answers.symptom_detail || [];
  const ageVal = answers.age?.[0] || '';

  // Determine severity
  let severityLevel = 0;
  if (hasPE && !hasED && !hasSize) {
    const dur = symptom[0] || '';
    if (dur === 'under1') severityLevel = 3;
    else if (dur === '1-3') severityLevel = 2;
    else if (dur === '3-5') severityLevel = 2;
    else severityLevel = 1;
  } else if (hasED && !hasPE && !hasSize) {
    const edState = symptom[0] || '';
    if (edState === 'none' || edState === 'weak') severityLevel = 3;
    else if (edState === 'unstable') severityLevel = 2;
    else severityLevel = 1;
  } else if (hasSize && !hasPE && !hasED) {
    severityLevel = 2;
  } else {
    severityLevel = 3;
  }

  const severityCN = severityLevel >= 3 ? '重度' : severityLevel === 2 ? '中重度' : '轻度';

  // Determine recommended plan
  let recPlan = '进阶计划(658迪拉姆)';
  if (hasPE && !hasED && !hasSize && health.length === 0 && !habits.includes('daily') && severityLevel <= 1) {
    recPlan = '基础计划(465迪拉姆)';
  } else if (hasSize || (hasPE && hasED) || health.length > 0) {
    recPlan = '综合计划(658迪拉姆)';
  }

  // Symptom detail label
  let symptomLabel = '';
  if (hasPE) {
    const dur = symptom[0] || '';
    const durMap = { under1: '不到1分钟', '1-3': '1-3分钟', '3-5': '3-5分钟', '5-10': '5-10分钟', over10: '超过10分钟' };
    symptomLabel = durMap[dur] || dur;
  } else if (hasED) {
    const edState = symptom[0] || '';
    const edMap = { none: '几乎没有勃起', weak: '勃起软弱，无法完成', unstable: '勃起不稳定，中途变软', morning: '只有晨勃', present: '有勃起但不如预期' };
    symptomLabel = edMap[edState] || edState;
  } else if (hasSize) {
    const sz = symptom[0] || '';
    const szMap = { under1: '小于4英寸(10cm)', '1-3': '4-5英寸(10-13cm)', '3-5': '5-6英寸(13-15cm)', '5-10': '6-7英寸(15-18cm)', over10: '大于7英寸(18cm+)' };
    symptomLabel = szMap[sz] || sz;
  }

  const condLabels = cond.map(c => condMap[c] || c).filter(c => c !== '全部问题').join('、') || '全部问题';
  const healthLabels = health.map(h => healthMap[h] || h).join('、') || '无';
  const lifeLabels = lifestyle.map(l => lifeMap[l] || l).join('、') || '无';
  const goalLabels = goal.map(g => goalMap[g] || g).join('、') || '未选择';
  const habitLabel = habitMap[habits[0]] || habits[0] || '未选择';

  const text = `📋 <b>新的诊断报告</b>\n` +
    `━━━━━━━━━━━━━━━━━━━━\n` +
    `👤 <b>客户信息</b>\n` +
    `• Messenger名字: ${name}${phone ? '\n• WhatsApp: ' + phone : ''}\n\n` +
    `📌 <b>诊断结果</b>\n` +
    `• 主要问题: ${condLabels}\n` +
    `• 严重程度: ${severityCN}\n` +
    `• 具体表现: ${symptomLabel || '—'}\n` +
    `• 年龄: ${ageMap[ageVal] || ageVal}\n\n` +
    `📋 <b>客户详细回答</b>\n` +
    `• 健康状况: ${healthLabels}\n` +
    `• 自慰频率: ${habitLabel}\n` +
    `• 生活方式: ${lifeLabels}\n` +
    `• 治疗目标: ${goalLabels}\n\n` +
    `🎯 <b>系统推荐方案</b>\n` +
    `• 推荐计划: ${recPlan}\n` +
    `• 计划时长: 30天\n` +
    `• 跟进方式: 每天WhatsApp个人跟踪\n\n` +
    `⏰ 提交时间: ${new Date().toLocaleString('zh-CN')}`;

  btn.disabled = true;
  btn.textContent = t('quiz_sending');

  const TELEGRAM_BOT_TOKEN = '8774208676:AAF4fmYVHXTK3lLIIggBqNBi6FI4pVkTnuI';
  const TELEGRAM_CHAT_ID   = '8758562396';

  fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      chat_id: TELEGRAM_CHAT_ID,
      text: text,
      parse_mode: 'HTML'
    })
  })
  .then(r => r.json())
  .then(result => {
    if (result.ok) {
      btn.textContent = t('quiz_send_success_btn');
      form.reset();
      setTimeout(() => { btn.disabled = false; btn.textContent = originalText; }, 4000);
    } else {
      throw new Error(result.description);
    }
  })
  .catch(err => {
    console.error('Send failed:', err);
    btn.disabled = false;
    btn.textContent = originalText;
    alert(t('quiz_send_error_alert'));
  });
}

// Wait for lang.js to finish loading translations, then render
document.addEventListener('i18n-ready', () => {
  renderStep();
});

// Fallback: if lang.js doesn't trigger the event (e.g., opened directly without server),
// render with Arabic defaults after a short delay
setTimeout(() => {
  const card = document.getElementById('quizCard');
  if (card && card.innerHTML.trim() === '' || card.innerHTML.includes('Steps injected by JS')) {
    renderStep();
  }
}, 500);
</script>
